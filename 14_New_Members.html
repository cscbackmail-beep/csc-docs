<!DOCTYPE html><html><head><meta charset="UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 16px; }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 14px; }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-wrap input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: #fff; outline: none; }
  .search-wrap input:focus { border-color: #888; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #999; font-size: 17px; pointer-events: none; }

  /* Filter row */
  .filter-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  
  /* Year toggle buttons */
  .year-group { display: flex; gap: 4px; }
  .year-btn { padding: 6px 12px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .year-btn.active { border-color: #0B2545; background: #0B2545; color: #fff; }
  .year-btn:hover:not(.active) { border-color: #888; color: #333; }

  /* Committee dropdown */
  .committee-wrap { flex: 1; min-width: 180px; }
  .committee-wrap select { width: 100%; padding: 7px 10px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 13px; background: #fff; color: #333; outline: none; cursor: pointer; }
  .committee-wrap select:focus { border-color: #0B2545; }

  /* Active filter tags */
  .active-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 0; }
  .filter-tag { display: inline-flex; align-items: center; gap: 5px; background: #0B2545; color: #fff; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .filter-tag button { background: none; border: none; color: #7BB8E8; font-size: 14px; cursor: pointer; padding: 0; line-height: 1; }

  /* Count */
  .count { font-size: 13px; color: #888; margin-bottom: 12px; }

  /* Cards */
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 14px 16px; margin-bottom: 10px; }
  .card-name { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .card-occ { font-size: 13px; color: #555; margin-bottom: 10px; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: #999; margin-bottom: 2px; }
  .field-val { font-size: 13px; color: #333; line-height: 1.4; }
  .field-val.muted { color: #aaa; font-style: italic; }
  .field.full { grid-column: 1 / -1; }
  .badge { display: inline-block; background: #f0efe8; color: #555; font-size: 11px; padding: 2px 8px; border-radius: 6px; margin-top: 2px; }
  
  /* GC year badge on card */
  .year-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-left: 8px; vertical-align: middle; }
  .year-badge.y2023 { background: #FFF3CD; color: #856404; }
  .year-badge.y2024 { background: #D1ECF1; color: #0C5460; }
  .year-badge.y2025 { background: #D4EDDA; color: #155724; }

  .no-results { text-align: center; padding: 40px 16px; color: #aaa; font-size: 15px; }
</style>

let activeYear = 'all';
let filtered = data;

// Populate committee dropdown
function buildDropdown() {
  const sel = document.getElementById('committeeSelect');
  const members = {};
  data.forEach(d => {
    if (d.committee && !members[d.committee]) {
      members[d.committee] = { no: d.committeeNo, year: gcYear[d.committee] || 'unknown' };
    }
  });
  // Sort by year then name
  const sorted = Object.entries(members).sort((a,b) => {
    const ya = a[1].year, yb = b[1].year;
    if (ya !== yb) return yb.localeCompare(ya);
    return a[0].localeCompare(b[0]);
  });
  sorted.forEach(([name, info]) => {
    const opt = document.createElement('option');
    opt.value = name;
    const yearLabel = info.year !== 'unknown' ? ` [${info.year} GC]` : '';
    opt.textContent = name + yearLabel;
    sel.appendChild(opt);
  });
}

function setYear(y) {
  activeYear = y;
  document.querySelectorAll('.year-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.year === y);
  });
  // Reset committee if switching year
  document.getElementById('committeeSelect').value = '';
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const committee = document.getElementById('committeeSelect').value;

  filtered = data.filter(d => {
    // Year filter
    if (activeYear === '2025' || activeYear === '2024' || activeYear === '2023') {
      if ((d.gcYearOverride || gcYear[d.committee] || 'none') !== activeYear) return false;
    } else if (activeYear === 'none') {
      if (d.committee) return false;
    }
    // Committee filter
    if (committee && d.committee !== committee) return false;
    // Search
    if (q) {
      return [d.name, d.occ, d.proposer, d.seconder, d.committee].some(f => f && f.toLowerCase().includes(q));
    }
    return true;
  });

  renderTags();
  render();
}

function renderTags() {
  const container = document.getElementById('activeTags');
  container.innerHTML = '';
  if (activeYear !== 'all') {
    const tag = document.createElement('div');
    tag.className = 'filter-tag';
    const label = activeYear === 'none' ? 'No GC Sponsor' : activeYear + ' GC';
    tag.innerHTML = `${label} <button onclick="setYear('all')">×</button>`;
    container.appendChild(tag);
  }
  const committee = document.getElementById('committeeSelect').value;
  if (committee) {
    const tag = document.createElement('div');
    tag.className = 'filter-tag';
    tag.innerHTML = `${committee} <button onclick="clearCommittee()">×</button>`;
    container.appendChild(tag);
  }
  const q = document.getElementById('search').value.trim();
  if (q) {
    const tag = document.createElement('div');
    tag.className = 'filter-tag';
    tag.innerHTML = `"${q}" <button onclick="clearSearch()">×</button>`;
    container.appendChild(tag);
  }
}

function clearCommittee() {
  document.getElementById('committeeSelect').value = '';
  applyFilters();
}
function clearSearch() {
  document.getElementById('search').value = '';
  applyFilters();
}

function fmt(val) { return (val && val.trim()) ? val.trim() : ''; }

function renderCard(d) {
  const occ = fmt(d.occ);
  const year = d.gcYearOverride || gcYear[d.committee];
  const yearBadge = year ? `<span class="year-badge y${year}">${year} GC</span>` : '';
  const proposer = d.proposer ? `${d.proposer}${d.proposerNo ? ' &nbsp;<span class="badge">#' + d.proposerNo + '</span>' : ''}` : '—';
  const seconder = d.seconder ? `${d.seconder}${d.seconderNo ? ' &nbsp;<span class="badge">#' + d.seconderNo + '</span>' : ''}` : '—';
  const committee = d.committee ? `${d.committee}${d.committeeNo ? ' &nbsp;<span class="badge">#' + d.committeeNo + '</span>' : ''}` : '—';

  return `<div class="card">
    <div class="card-name">${d.name}${yearBadge}</div>
    ${occ ? `<div class="card-occ">${occ}</div>` : '<div class="card-occ muted">Occupation not listed</div>'}
    <div class="card-grid">
      <div class="field full"><div class="field-label">Proposer</div><div class="field-val">${proposer}</div></div>
      <div class="field full"><div class="field-label">Seconder</div><div class="field-val">${seconder}</div></div>
      ${d.committee ? `<div class="field full"><div class="field-label">Committee Member</div><div class="field-val">${committee}</div></div>` : ''}
    </div>
  </div>`;
}

function render() {
  const container = document.getElementById('cards');
  const count = document.getElementById('count');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matches found</div>';
    count.textContent = '';
    return;
  }
  count.textContent = `${filtered.length} applicant${filtered.length !== 1 ? 's' : ''}`;
  container.innerHTML = filtered.map(renderCard).join('');
}

buildDropdown();
setYear('all');
applyFilters();
